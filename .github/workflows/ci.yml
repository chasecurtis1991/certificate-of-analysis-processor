name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22, 24]

    name: Node.js ${{ matrix.node-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Syntax check - index
        run: node --check index.js

      - name: Syntax check - setup
        run: node --check setup.js

      - name: Syntax check - seed
        run: node --check seed-processed.js

      - name: Verify secrets not committed
        run: |
          if [ -f config.json ]; then
            echo "ERROR: config.json should not be committed!" && exit 1
          fi
          if [ -f google-credentials.json ]; then
            echo "ERROR: google-credentials.json should not be committed!" && exit 1
          fi
          echo "No secrets found - clean"

      - name: Validate secret structure
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -z "$GOOGLE_CREDS" ]; then
            echo "WARNING: GOOGLE_CREDENTIALS secret not configured"
          else
            echo "Secrets present - OK"
          fi

  notify:
    runs-on: ubuntu-latest
    needs: validate
    if: failure()

    steps:
      - name: Notify Discord on failure
        run: |
          curl -s -H "Content-Type: application/json" \
          -d "{\"content\":\"🚨 **COA Pipeline CI failed** on \`${{ github.ref_name }}\` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}